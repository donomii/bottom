version: 2

project_name: bottom-events

builds:
  - id: bottom-events
    binary: bottom
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.FullCommit}} -X main.buildDate={{.Date}}

archives:
  - ids:
      - bottom-events
    name_template: "bottom-events_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - docs/bottom.1

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
