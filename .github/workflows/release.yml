name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - if: runner.os == 'macOS'
        run: go test -tags endpointsecurity ./...
      - name: Polling lifecycle smoke
        run: go test -tags smoke -run "^TestPollingLifecycleSmoke$" -v
      - name: Linux native lifecycle smoke
        if: runner.os == 'Linux'
        run: |
          go test -c -tags smoke -o bottom-smoke.test .
          sudo ./bottom-smoke.test -test.v -test.run "^TestNativeLifecycleSmoke$"
      - name: Windows native lifecycle smoke
        if: runner.os == 'Windows'
        run: go test -tags smoke -run "^TestNativeLifecycleSmoke$" -v
      - run: go vet ./...

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race ./...

  build-portable:
    needs: [test, race]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean --skip=publish
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-portable
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sbom.json
          if-no-files-found: error

  build-darwin:
    needs: [test, race]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: amd64
          - runner: macos-15
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -tags endpointsecurity ./...
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0
      - name: Build Endpoint Security archive
        env:
          GOARCH: ${{ matrix.arch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_DATE="$(git show -s --format=%cI HEAD)"
          ARCHIVE="bottom-events_${VERSION}_darwin_${GOARCH}.tar.gz"
          mkdir -p stage/docs stage/packaging/macos
          CGO_ENABLED=1 go build -tags endpointsecurity -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${GITHUB_SHA} -X main.buildDate=${BUILD_DATE}" -o stage/bottom .
          cp LICENSE README.md CHANGELOG.md stage/
          cp docs/bottom.1 docs/endpoint-security.md stage/docs/
          cp packaging/macos/bottom.entitlements stage/packaging/macos/
          tar -C stage -czf "${ARCHIVE}" bottom LICENSE README.md CHANGELOG.md docs/bottom.1 docs/endpoint-security.md packaging/macos/bottom.entitlements
          syft "${ARCHIVE}" --output "spdx-json=${ARCHIVE}.sbom.json"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-darwin-${{ matrix.arch }}
          path: |
            bottom-events_*_darwin_${{ matrix.arch }}.tar.gz
            bottom-events_*_darwin_${{ matrix.arch }}.tar.gz.sbom.json
          if-no-files-found: error

  release:
    needs: [build-portable, build-darwin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: Prepare release metadata
        run: |
          go run ./tools/releasenotes
          cd dist
          sha256sum bottom-events_*.tar.gz bottom-events_*.zip bottom-events_*.sbom.json | sort > checksums.txt
      - name: Attest release provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            dist/bottom-events_*.tar.gz
            dist/bottom-events_*.zip
            dist/bottom-events_*.sbom.json
      - name: Publish checksummed release with notes and SBOMs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          gh release create "${GITHUB_REF_NAME}" bottom-events_*.tar.gz bottom-events_*.zip bottom-events_*.sbom.json checksums.txt --verify-tag --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
